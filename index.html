<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover: use the full screen behind notches; user-scalable=no +
         maximum-scale=1: stop the browser's own pinch-zoom from fighting the
         in-game drag-to-look / joystick. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Prop Hunt</title>
    <link rel="stylesheet" href="/css/style.css" />
    <!-- Three.js via CDN + importmap keeps the skeleton build-step-free. The
         `three/addons/` entry lets the render layer lazily import GLTFLoader for
         the restaurant's real GLB meshes. NOTE: an importmap only DECLARES module
         URLs — nothing is fetched here at page load, so the headless boot-time
         load check still makes zero external requests (the actual GLTFLoader +
         Three fetches happen on first match start, from js/scene.js). -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <!-- Landing / lobby screen -->
    <div id="menu" class="screen">
      <div class="menu-art">
        <img src="/assets/attached_2.webp" alt="prop mascot" class="mascot" />
      </div>
      <div class="menu-card">
        <h1>PROP HUNT</h1>
        <p class="tag">Hide as a prop. Or hunt them all down.</p>

        <label>Name<input id="name" maxlength="16" placeholder="Player" /></label>

        <div class="row">
          <button id="createBtn" class="primary">Create room</button>
        </div>
        <div class="row join-row">
          <input id="roomCode" maxlength="4" placeholder="CODE" class="code-input" />
          <button id="joinBtn">Join</button>
        </div>
        <p id="menuError" class="error"></p>
        <p class="hint">Players connect peer-to-peer &mdash; the room creator hosts the match.</p>
      </div>
    </div>

    <!-- Lobby (in a room, before match starts) -->
    <div id="lobby" class="screen hidden">
      <div class="menu-card">
        <h1>LOBBY</h1>
        <p class="roomcode">Room code: <span id="lobbyCode">----</span></p>
        <div class="row">
          <button id="copyLinkBtn" class="ghost">Copy invite link</button>
        </div>
        <ul id="playerList" class="player-list"></ul>
        <div class="map-picker">
          <p class="map-picker-label">Map</p>
          <div id="mapList" class="map-list"></div>
        </div>
        <div class="row">
          <button id="readyBtn">Ready</button>
          <button id="startBtn" class="primary hidden">Start match</button>
        </div>
        <p id="lobbyHint" class="hint"></p>
      </div>
    </div>

    <!-- In-game -->
    <div id="game" class="screen hidden">
      <canvas id="view"></canvas>
      <div id="crosshair" class="hidden">+</div>
      <div id="hud" class="hidden">
        <div class="hud-top">
          <span id="hudRole" class="pill">&mdash;</span>
          <span id="hudTimer" class="pill">0:00</span>
          <span id="hudProps" class="pill">Props: 0/0</span>
        </div>
        <div id="banner" class="banner hidden"></div>
        <div id="feed" class="feed"></div>
      </div>
      <div id="clickToPlay" class="overlay hidden">Click to play</div>
    </div>

    <!-- Dev-only Map Editor launcher (desktop, host/solo only). Hidden by default;
         main.js reveals it when the level editor is enterable (never mid-multiplayer,
         never on touch). Clicking it opens the editor with the help panel shown. The
         Ctrl+E hotkey still works independently. -->
    <button id="editBtn" class="dev-btn hidden" type="button">🛠 Map Editor (dev use only)</button>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
